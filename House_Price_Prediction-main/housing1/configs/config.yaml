# MLOps Configuration for House Price Prediction

# Project Settings
project:
  name: "House Price Prediction"
  version: "1.0.0"
  description: "MLOps pipeline for house price prediction"

# Data Configuration
data:
  raw_path: "data/raw/house_price.csv"
  processed_path: "data/processed/"
  test_size: 0.2
  random_state: 42
  validation_size: 0.2

# Model Configuration
model:
  type: "linear_regression"
  name: "house_price_model"
  save_path: "models/"
  metrics:
    - "mae"
    - "mse"
    - "rmse"
    - "r2"

# Training Configuration
training:
  max_iter: 1000
  tolerance: 1e-4
  early_stopping: true
  patience: 10

# Experiment Tracking
experiment:
  tracking_uri: "mlruns"
  experiment_name: "house_price_experiment"
  log_models: true

# Monitoring
monitoring:
  drift_threshold: 0.1
  performance_threshold: 0.8
  check_frequency: "daily"
  alerts_email: "team@example.com"

# API Configuration
api:
  host: "0.0.0.0"
  port: 5000
  debug: false
  workers: 4

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/app.log"
