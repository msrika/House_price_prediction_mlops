name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 mypy
    
    - name: Lint code
      run: |
        flake8 src/ pipelines/ api.py --max-line-length=120
        echo "✓ Linting passed"
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=src --cov-report=xml
        echo "✓ Tests passed"
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
    
    - name: Type checking
      run: |
        mypy src/ --ignore-missing-imports
        echo "✓ Type checking passed"

  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      run: |
        docker build -t house-price-prediction:${{ github.sha }} .
        echo "✓ Docker image built"
    
    - name: Save Docker image
      run: |
        docker save house-price-prediction:${{ github.sha }} > house-price-prediction.tar
    
    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: house-price-prediction.tar

  validate-model:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Validate model training
      run: |
        python pipelines/train.py --target Price || echo "Model training validation failed"
    
    - name: Check model performance
      run: |
        python -c "
        import joblib
        import pandas as pd
        from sklearn.metrics import r2_score
        
        # Load model
        model = joblib.load('models/house_price_model.pkl')
        
        # Load test data
        df = pd.read_csv('data/processed/test.csv')
        
        if 'Price' in df.columns:
            X_test = df.drop('Price', axis=1)
            y_test = df['Price']
            
            # Make predictions
            y_pred = model.predict(X_test)
            
            # Calculate R²
            r2 = r2_score(y_test, y_pred)
            print(f'Model R² Score: {r2:.4f}')
            
            # Check threshold
            if r2 < 0.6:
                raise Exception('Model performance below threshold!')
            
            print('✓ Model validation passed')
        else:
            print('⚠️  Test data not available, skipping validation')
        "

  deploy:
    needs: [build, validate-model]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download Docker image
      uses: actions/download-artifact@v3
      with:
        name: docker-image
        path: .
    
    - name: Load Docker image
      run: |
        docker load < house-price-prediction.tar
    
    - name: Deploy to staging
      run: |
        echo "🚀 Deploying to staging environment..."
        # Add your deployment commands here
        # Example: kubectl apply -f k8s/staging/
        # Example: docker-compose -f docker-compose.staging.yml up -d
        echo "✓ Deployed to staging"
    
    - name: Run integration tests
      run: |
        echo "🧪 Running integration tests..."
        # Add integration test commands here
        echo "✓ Integration tests passed"
    
    - name: Deploy to production
      if: success()
      run: |
        echo "🎯 Deploying to production..."
        # Add your production deployment commands here
        # Example: kubectl apply -f k8s/production/
        # Example: docker-compose -f docker-compose.prod.yml up -d
        echo "✓ Deployed to production"

  notify:
    needs: [deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Send notification
      run: |
        echo "📧 Sending deployment notification..."
        # Add notification logic here (Slack, email, etc.)
        # Example: curl -X POST $SLACK_WEBHOOK_URL -d '{"text": "Deployment completed!"}'
        echo "✓ Notification sent"
